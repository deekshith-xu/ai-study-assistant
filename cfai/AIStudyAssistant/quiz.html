<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz Assessment</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">🤖 AI Study Assistant</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="notes.html">Notes</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="chatbot.html">AI Chat</a></li>
            <li><a href="progress.html">Progress</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>🧠 AI Quiz Assessment</h1>
    <p>Test your Artificial Intelligence knowledge.</p>
</section>

<div class="quiz-container">

<form id="quizForm">

<div class="question">
<h3>1. What does AI stand for?</h3>

<label><input type="radio" name="q1" value="0"> Automated Intelligence</label>
<label><input type="radio" name="q1" value="1"> Artificial Intelligence</label>
<label><input type="radio" name="q1" value="0"> Artificial Internet</label>
</div>

<div class="question">
<h3>2. Which language is most popular in AI?</h3>

<label><input type="radio" name="q2" value="1"> Python</label>
<label><input type="radio" name="q2" value="0"> HTML</label>
<label><input type="radio" name="q2" value="0"> CSS</label>
</div>

<div class="question">
<h3>3. What is Machine Learning?</h3>

<label><input type="radio" name="q3" value="1"> Subset of AI</label>
<label><input type="radio" name="q3" value="0"> Database</label>
<label><input type="radio" name="q3" value="0"> Browser</label>
</div>

<div class="question">
<h3>4. ChatGPT is based on?</h3>

<label><input type="radio" name="q4" value="1"> Large Language Models</label>
<label><input type="radio" name="q4" value="0"> Compiler</label>
<label><input type="radio" name="q4" value="0"> Antivirus</label>
</div>

<div class="question">
<h3>5. NLP stands for?</h3>

<label><input type="radio" name="q5" value="1"> Natural Language Processing</label>
<label><input type="radio" name="q5" value="0"> Neural Learning Program</label>
<label><input type="radio" name="q5" value="0"> Natural Logic Programming</label>
</div>

<button type="button" class="submit-btn" onclick="calculateScore()">
Submit Quiz
</button>

</form>

<div id="result" class="result-box">

<h2 id="score"></h2>

<div class="progress">
<div id="bar"></div>
</div>

<h3 id="message"></h3>

<div id="mistakes"></div>

<button onclick="location.reload()" class="retry-btn">
Try Again
</button>

</div>

</div>

<script>

function calculateScore(){

let score=0;

let total=5;

let mistakes=[];

for(let i=1;i<=5;i++){

let answer=
document.querySelector(
'input[name="q'+i+'"]:checked'
);

if(answer){

score += parseInt(answer.value);

if(answer.value=="0"){

mistakes.push(
"Question "+i+" is incorrect."
);

}

}else{

mistakes.push(
"Question "+i+" was not answered."
);

}

}

let percent=
(score/total)*100;

document.getElementById(
"result"
).style.display="block";

document.getElementById(
"score"
).innerHTML=
"Score : "+score+" / "+total;

document.getElementById(
"bar"
).style.width=
percent+"%";

if(percent>=80){

document.getElementById(
"message"
).innerHTML=
"🌟 Excellent";

}
else if(percent>=50){

document.getElementById(
"message"
).innerHTML=
"👍 Good Job";

}
else{

document.getElementById(
"message"
).innerHTML=
"📚 Practice More";

}

if(mistakes.length>0){

document.getElementById(
"mistakes"
).innerHTML=
"<h3>Mistakes</h3><ul><li>"
+
mistakes.join(
"</li><li>"
)
+
"</li></ul>";

}
else{

document.getElementById(
"mistakes"
).innerHTML=
"<h3>Perfect Score 🎉</h3>";

}

}

</script>

</body>
</html>
